<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAPGEN // CORPLLM</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside id="sidebar">
    <button id="sidebar-toggle" title="Toggle sidebar">&#9664;</button>
    <div id="sidebar-content">
      <div class="sidebar-title">MAP<span>GEN</span></div>

      <!-- Base -->
      <div class="section">
        <div class="section-title">Base</div>
        <div class="seed-row">
          <input type="number" id="cfg-seed" value="42" placeholder="seed">
          <button id="btn-random" class="secondary">RND</button>
        </div>
        <div class="dim-row">
          <label>W</label>
          <input type="number" id="cfg-width" value="1000" min="100" max="10000">
          <label>H</label>
          <input type="number" id="cfg-height" value="800" min="100" max="10000">
        </div>
        <div class="field">
          <label>Cells</label>
          <input type="range" id="cfg-cells" min="500" max="5000" step="50" value="1000">
          <span class="range-val" id="cfg-cells-val">1000</span>
        </div>
        <div class="field">
          <label>Relax</label>
          <input type="range" id="cfg-relax" min="0" max="10" value="3">
          <span class="range-val" id="cfg-relax-val">3</span>
        </div>
      </div>

      <!-- Coast -->
      <div class="section">
        <div class="section-title">
          <label class="toggle-label">
            <input type="checkbox" id="cfg-coast-en" checked> Coast
          </label>
        </div>
        <div id="coast-opts">
          <div class="field">
            <label>Side</label>
            <select id="cfg-coast-side">
              <option value="north">North</option>
              <option value="south" selected>South</option>
              <option value="east">East</option>
              <option value="west">West</option>
            </select>
          </div>
          <div class="field">
            <label>Noise</label>
            <input type="range" id="cfg-coast-noise" min="0" max="100" value="50">
            <span class="range-val" id="cfg-coast-noise-val">0.50</span>
          </div>
          <div class="field">
            <label>Water%</label>
            <input type="range" id="cfg-water-ratio" min="5" max="80" value="25">
            <span class="range-val" id="cfg-water-ratio-val">25%</span>
          </div>
        </div>
      </div>

      <!-- Rivers -->
      <div class="section">
        <div class="section-title">
          <label class="toggle-label">
            <input type="checkbox" id="cfg-rivers-en" checked> Rivers
          </label>
        </div>
        <div id="rivers-opts">
          <div id="rivers-list"></div>
          <button id="btn-add-river" class="secondary add-btn">+ ADD RIVER</button>
        </div>
      </div>

      <!-- Lakes -->
      <div class="section">
        <div class="section-title">
          <label class="toggle-label">
            <input type="checkbox" id="cfg-lakes-en" checked> Lakes
          </label>
        </div>
        <div id="lakes-opts">
          <div id="lakes-list"></div>
          <button id="btn-add-lake" class="secondary add-btn">+ ADD LAKE</button>
        </div>
      </div>

      <button id="btn-generate">&#9654; GENERATE</button>
    </div>
  </aside>

  <!-- Main area -->
  <div id="main">
    <div id="canvas-wrap">
      <canvas id="map-canvas"></canvas>

      <div id="toolbar">
        <button id="btn-import" class="secondary">IMPORT</button>
        <button id="btn-export" class="secondary">EXPORT</button>
      </div>

      <div id="loading">
        <div class="spinner"></div>
      </div>

      <div id="empty-state">
        <div class="empty-icon">&#9671;</div>
        <div>CONFIGURE AND GENERATE</div>
      </div>
    </div>

    <div id="legend-bar">
      <div class="legend-item"><span class="swatch" style="background:#1b2e1b"></span>LAND</div>
      <div class="legend-item"><span class="swatch" style="background:#0a1828"></span>WATER</div>
      <div class="legend-item"><span class="swatch" style="background:#0e2238"></span>LAKE</div>
      <div class="legend-item"><span class="swatch" style="background:#1a4e72"></span>RIVER</div>
      <div class="legend-item"><span class="swatch line" style="background:#3a9ab8"></span>COAST</div>
      <div id="statusbar"></div>
    </div>
  </div>
</div>

<!-- Templates (not rendered) -->
<template id="river-row-template">
  <div class="dyn-row">
    <select class="river-width">
      <option value="narrow">Narrow</option>
      <option value="medium" selected>Medium</option>
      <option value="wide">Wide</option>
    </select>
    <select class="river-route">
      <option value="border-coast" selected>Border&rarr;Coast</option>
      <option value="inland-coast">Inland&rarr;Coast</option>
      <option value="border-inland">Border&rarr;Inland</option>
      <option value="inland-inland">Inland&rarr;Inland</option>
    </select>
    <button class="btn-remove" title="Remove">&times;</button>
  </div>
</template>

<template id="lake-row-template">
  <div class="dyn-row">
    <select class="lake-size">
      <option value="small">Small</option>
      <option value="medium" selected>Medium</option>
      <option value="large">Large</option>
    </select>
    <button class="btn-remove" title="Remove">&times;</button>
  </div>
</template>

<input type="file" id="file-input" accept=".json" style="display:none">
<script src="app.js"></script>
</body>
</html>
